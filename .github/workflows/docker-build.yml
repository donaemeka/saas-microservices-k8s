name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth
          push: true
          tags: donaemeka/auth-service:latest

      - name: Build and push tenant-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/tenant
          push: true
          tags: donaemeka/tenant-service:latest

      - name: Build and push task-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/task
          push: true
          tags: donaemeka/task-service:latest

      - name: Build and push gateway-service
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: donaemeka/gateway-service:latest