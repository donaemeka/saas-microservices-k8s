apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant
  template:
    metadata:
      labels:
        app: tenant
    spec:
      containers:
        - name: tenant
          image: donaemeka/tenant-service:latest
          ports:
            - containerPort: 3002